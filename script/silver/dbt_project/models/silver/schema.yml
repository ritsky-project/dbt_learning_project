version: 2

sources:
  - name: bronze
    database: TestDB
    schema: bronze

    tables:
      - name: customers
        description: |
          Raw customer data ingested from the source operational system (CRM).

          This table represents the bronze layer and contains unprocessed,
          source-aligned records with minimal transformations.

          It serves as the foundation for downstream staging models in DBT.

          Data Characteristics:
          - May contain nulls, duplicates, and inconsistent formats
          - Reflects source system structure without cleaning
          - Updated based on ingestion frequency (e.g., daily batch)

        columns:

          - name: customer_id
            description: |
              Unique identifier assigned to each customer in the source system.
              Acts as the primary key for customer records.
            tests: [not_null, unique]

          - name: title
            description: |
              Honorific or title of the customer (e.g., Mr, Ms, Dr).
              May contain inconsistent formatting from source.

          - name: first_name
            description: |
              Given name of the customer.
              Raw value without standardization.

          - name: last_name
            description: |
              Family name or surname of the customer.

          - name: full_name
            description: |
              Full name constructed from first and last name.
              May include inconsistencies depending on source formatting.

          - name: gender
            description: |
              Gender of the customer.
              Possible values may include inconsistent formats
              such as 'M', 'F', 'Male', 'Female', etc.

          - name: date_of_birth
            description: |
              Date of birth of the customer.
              Used for age calculation and demographic analysis.

          - name: age
            description: |
              Age of the customer in years.
              May be derived or directly provided by source system.

          - name: email
            description: |
              Email address of the customer.
              Not guaranteed to be unique or validated.

          - name: phone
            description: |
              Contact phone number of the customer.
              Format may vary across records.

          - name: address
            description: |
              Full address string of the customer.
              May include street, locality, and additional details.

          - name: city
            description: |
              City where the customer resides.

          - name: state
            description: |
              State or province name.

          - name: state_abbr
            description: |
              Abbreviated form of the state name.

          - name: state_full
            description: |
              Full standardized state name.

          - name: zip_code
            description: |
              Postal or ZIP code of the customer address.

          - name: country
            description: |
              Country of residence.

          - name: region
            description: |
              Geographical region classification (e.g., North, South).

          - name: customer_segment
            description: |
              Business-defined segmentation category
              (e.g., Retail, Corporate, VIP).

          - name: loyalty_points
            description: |
              Total loyalty reward points accumulated by the customer.

          - name: is_active
            description: |
              Boolean flag indicating whether the customer account is active.

          - name: account_created_date
            description: |
              Timestamp indicating when the customer account was created.

          - name: preferred_channel
            description: |
              Preferred communication channel of the customer
              (e.g., Email, Phone, SMS).

          - name: annual_income_usd
            description: |
              Estimated or declared annual income of the customer in USD.

          - name: company
            description: |
              Organization or company associated with the customer.
              May be null for individual customers.