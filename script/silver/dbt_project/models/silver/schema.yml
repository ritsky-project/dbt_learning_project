version: 2

sources:
  - name: bronze
    database: TestDB
    schema: bronze

    tables:
      - name: customers

        description: >
          Raw customer dataset ingested from the CRM source system into the bronze layer.
          This table preserves source-aligned records before downstream business
          transformations and standardization in the silver layer.

        meta:
          layer: bronze

          ingestion_type: batch

          data_characteristics:
            - Source-aligned raw records
            - Minimal transformation applied
            - May contain nulls, duplicates, inconsistent casing, and formatting issues

          profiling_summary:
            - Duplicate customer_id values were identified and profiled
            - Multiple categorical columns contain inconsistent source values
            - loyalty_points contains unresolved NULL values across customer segments
            - annual_income_usd contains missing values suitable for statistical imputation

          downstream_usage:
            - Source for silver customer transformation models
            - Used for customer standardization and semantic validation workflows

        columns:

          - name: customer_id
            description: "Unique identifier for a customer record."

            tests:
              - not_null
              - unique

            meta:
              profiling_note: >
                Duplicate and NULL checks were performed during profiling.

          - name: title
            description: "Customer title or honorific."

          - name: first_name
            description: "Customer first name from source system."

          - name: last_name
            description: "Customer last name from source system."

          - name: full_name
            description: "Customer full display name."

          - name: gender
            description: "Customer gender category."

            meta:
              transformation_logic: >
                Source gender values are standardized using CASE-based mappings.

              standardized_values:
                - Male
                - Female
                - Non-Binary
                - Other
                - Unknown

          - name: date_of_birth
            description: "Customer date of birth."

          - name: age
            description: "Customer age in years."

          - name: email
            description: "Customer email address."

          - name: phone
            description: "Customer phone number."

          - name: address
            description: "Customer address."

          - name: city
            description: "Customer city."

          - name: state
            description: "Customer state or province."

          - name: state_abbr
            description: "Abbreviated state code."

          - name: state_full
            description: "Standardized full state name."

          - name: zip_code
            description: "Postal or ZIP code."

          - name: country
            description: "Customer country."

            meta:
              transformation_logic: >
                Country values are normalized into standardized country names.

              standardized_values:
                - United States
                - Unknown

          - name: region
            description: "Customer geographic region."

            meta:
              transformation_logic: >
                NULL and blank region values are standardized to 'Unknown'.

          - name: customer_segment
            description: "Business-defined customer segmentation category."

            meta:
              profiling_note: >
                NULL values were identified and standardized during transformation.

          - name: loyalty_points
            description: >
              Loyalty points associated with customer purchases and engagement activity.

            meta:
              data_quality_note: >
                NULL values exist across multiple customer segments,
                including Platinum customers.

              semantic_validation_note: >
                Segment distribution analysis suggests potential business-rule
                inconsistencies because higher-tier customer segments are expected
                to correlate with loyalty engagement levels.

              transformation_strategy: >
                loyalty_points NULL values were intentionally preserved because
                no validated business rule was available for safe replacement.

          - name: is_active
            description: "Customer account active status."

            meta:
              transformation_logic: >
                Multiple source representations were standardized into boolean-like values.

              standardized_values:
                - "True"
                - "False"
                - "Unknown"

          - name: account_created_date
            description: "Customer account creation timestamp."

          - name: preferred_channel
            description: "Customer preferred communication or engagement channel."

            meta:
              transformation_logic: >
                Source channel values were standardized into unified business categories.

              standardized_values:
                - Mobile App
                - Website
                - In Store
                - Catalog
                - Phone Call
                - Unknown

          - name: annual_income_usd
            description: "Estimated annual customer income in USD."

            meta:
              null_handling_strategy: >
                Missing values are replaced using median annual income
                within each customer_segment.

              imputation_method: >
                PERCENTILE_CONT median imputation partitioned by customer_segment.

          - name: company
            description: "Customer-associated company or organization."

            meta:
              transformation_logic: >
                NULL, blank, and line-break-only values are standardized to 'Unknown'.